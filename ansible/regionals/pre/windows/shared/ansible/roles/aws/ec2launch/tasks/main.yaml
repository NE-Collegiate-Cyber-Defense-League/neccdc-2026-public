---
- name: Copy EC2Launch config to instance
  ansible.windows.win_copy:
    src: files/agent-config.yml
    dest: C:\ProgramData\Amazon\EC2Launch\config\agent-config.yml

- name: Remove startup wallpaper shortcut (Administrator)
  ansible.windows.win_file:
    path: >-
      C:\Users\Administrator\AppData\Roaming\Microsoft\Windows\Start Menu\Programs\Startup\setwallpaper.lnk
    state: absent

- name: Remove startup wallpaper shortcut (Default)
  ansible.windows.win_file:
    path: >-
      C:\Users\Default\AppData\Roaming\Microsoft\Windows\Start Menu\Programs\Startup\setwallpaper.lnk
    state: absent