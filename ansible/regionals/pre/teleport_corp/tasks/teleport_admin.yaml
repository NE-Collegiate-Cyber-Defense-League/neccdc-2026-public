- name: Create admin users account
  ansible.builtin.user:
    name: "{{ username }}"
    password: "{{ password | password_hash('sha256') }}"
    shell: "/bin/bash"
    uid: 5000
  tags:
    - users

- name: Allow the admin user to sudo tctl
  community.general.sudoers:
    name: "90-{{ username }}-tctl"
    state: present
    user: "{{ username }}"
    commands: /usr/local/bin/tctl
  tags:
    - users

- name: Create admin readme note
  ansible.builtin.copy:
    content: |
      If Teleport admin authentication is broken you can run the script './reset-creds' reset your credentials
    dest: /home/admin/readme
    owner: admin
    group: users
    mode: '0600'
  tags:
    - user

- name: Create admin reset script
  ansible.builtin.copy:
    content: |
      #!/bin/sh
      sudo tctl users reset admin
    dest: /home/admin/reset-creds
    owner: admin
    group: users
    mode: '0755'
  tags:
    - user
