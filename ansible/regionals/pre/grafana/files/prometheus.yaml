global:
  scrape_interval: 30s

rule_files:
  - /etc/prometheus/rules.yml

scrape_configs:
  - job_name: grafana
    static_configs:
      - targets:
          - "grafana:3000"
        labels:
          instance: grafana
  - job_name: mimir
    static_configs:
      - targets: [ 'mimir-1:8080' ]
        labels:
          instance: 'mimir-1'
      - targets: [ 'mimir-2:8080' ]
        labels:
          instance: 'mimir-2'
      - targets: [ 'mimir-3:8080' ]
        labels:
          instance: 'mimir-3'
  - job_name: prometheus
    static_configs:
    - targets: ['localhost:9090']
      labels:
        instance: prometheus
  - job_name: loki
    static_configs:
      - targets: [ 'loki-1:3100' ]
        labels:
          instance: 'loki-1'
      - targets: [ 'loki-2:3100' ]
        labels:
          instance: 'loki-2'
      - targets: [ 'loki-3:3100' ]
        labels:
          instance: 'loki-3'
  - job_name: nginx
    static_configs:
      - targets: [ 'nginx-healthcheck:9113' ]
        labels:
          instance: load-balancer

  - job_name: integrations/traefik
    static_configs:
      - targets: [ 'traefik:8080' ]
        labels:
          instance: grafana-stack

remote_write:
  - url: http://load-balancer:9008/api/v1/push
