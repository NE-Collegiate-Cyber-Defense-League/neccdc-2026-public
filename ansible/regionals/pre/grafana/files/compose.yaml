services:
  grafana:
    image: grafana/grafana
    restart: always
    volumes:
      - ./grafana-provisioning-datasources.yaml:/etc/grafana/provisioning/datasources/provisioning-datasources.yaml
      - ./grafana-provisioning-dashboards.yaml:/etc/grafana/provisioning/dashboards/provisioning-dashboards.yaml
      - ./grafana-provisioning-contact-points.yaml:/etc/grafana/provisioning/alerting/contact-points.yaml
      - ./grafana-provisioning-alert-rules.yml:/etc/grafana/provisioning/alerting/rules.yaml
      - ./dashboards:/var/lib/grafana/dashboards
      - ./grafana.ini:/etc/grafana/grafana.ini
      - grafana-storage:/var/lib/grafana
    ports:
      - 9000:3000
    depends_on:
      - "db"
      - "load-balancer"
      - "traefik"
    networks:
      - monitoring
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`grafana.<team_number>.chefops.tech`)"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"
      - "traefik.http.routers.grafana.entrypoints=websecure"

  storage:
    image: rustfs/rustfs
    environment:
      - RUSTFS_ADDRESS=0.0.0.0:9001
      - RUSTFS_CONSOLE_ADDRESS=0.0.0.0:9005
      - RUSTFS_CONSOLE_ENABLE=true
      - RUSTFS_CORS_ALLOWED_ORIGINS=*
      - RUSTFS_CONSOLE_CORS_ALLOWED_ORIGINS=*
      - RUSTFS_ACCESS_KEY=storageuser
      - RUSTFS_SECRET_KEY=storagepassword
    restart: always
    volumes:
      - rust-data:/data
    ports:
      - 9001:9001
      - 9005:9005
    networks:
      - monitoring
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.rustfs.rule=Host(`storage.<team_number>.chefops.tech`)"
      - "traefik.http.routers.rustfs.service=rustfs"
      - "traefik.http.routers.rustfs.entrypoints=websecure"
      - "traefik.http.services.rustfs.loadbalancer.server.port=9001"
      - "traefik.http.services.rustfs.loadbalancer.healthcheck.path=/health"
      - "traefik.http.routers.rustfs-console.rule=Host(`storage-console.<team_number>.chefops.tech`)"
      - "traefik.http.routers.rustfs-console.service=rustfs-console"
      - "traefik.http.routers.rustfs-console.entrypoints=websecure"
      - "traefik.http.services.rustfs-console.loadbalancer.server.port=9005"
    healthcheck:
      test:
        [
          "CMD",
          "sh",
          "-c",
          "curl -f http://localhost:9001/health && curl -f http://localhost:9005/rustfs/console/health",
        ]
      timeout: 5s
      retries: 10
      start_period: 15s
      interval: 5s

  db:
    container_name: grafana_db
    image: postgres:15-alpine
    environment:
      POSTGRES_DATABASE: grafana
      POSTGRES_USER: grafana
      POSTGRES_PASSWORD: grafana
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - monitoring
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d grafana -U grafana"]
      timeout: 10s
      retries: 10
    restart: always
    ports:
      - 5432:5432

  prometheus:
    image: prom/prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --log.level=error
      - --storage.tsdb.path=/prometheus
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
    volumes:
      - ./prometheus.yaml:/etc/prometheus/prometheus.yml
    depends_on:
      - "mimir-1"
      - "mimir-2"
      - "mimir-3"
    networks:
      - monitoring
    ports:
      - 9090:9090

  load-balancer:
    image: nginx
    restart: always
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl/fullchain.crt:/etc/ssl/cert.pem
      - ./ssl/private.key:/etc/ssl/key.pem
    ports:
      - 9008-9009:9008-9009
    healthcheck:
       test: ["CMD-SHELL", "curl -f http://localhost || exit 1"]
       interval: 1m30s
       timeout: 30s
       retries: 5
       start_period: 30s
    depends_on:
      - "mimir-1"
      - "mimir-2"
      - "mimir-3"
      - "loki-1"
      - "loki-2"
      - "loki-3"
    networks:
      - monitoring
    environment:
      INSTANCE_ID: "load-balancer-<team_number>"

  traefik:
    image: traefik
    restart: always
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "./traefik.yaml:/etc/traefik/traefik.yaml"
      - "./traefik-ssl.yaml:/etc/traefik/traefik-ssl.yaml"
      - "./ssl:/ssl"
    ports:
      - "443:443"
      - "8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=(Host(`traefik.<team_number>.chefops.tech`) && (PathPrefix(`/api`) || PathPrefix(`/dashboard`)))"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.entrypoints=traefik"
    networks:
      - monitoring
    environment:
      INSTANCE_ID: "traefik-<team_number>"

  nginx-healthcheck:
    restart: unless-stopped
    image: nginx/nginx-prometheus-exporter:1
    command: --nginx.scrape-uri=http://load-balancer:9152/
    ports:
      - 9113:9113
    depends_on:
      load-balancer:
        condition: service_healthy
    networks:
      - monitoring

  memcached:
    image: memcached:1-alpine
    restart: always
    command:
      - --conn-limit=1024
      - --memory-limit=64
      - --threads=4
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "11211"]
      interval: 30s
      timeout: 10s
      retries: 5
    ports:
      - 11211:11211
    networks:
      - monitoring

include:
  - ./mimir-compose.yaml
  - ./loki-compose.yaml

volumes:
  certs:
  grafana-storage:
  postgres-data:
  rust-data:

networks:
  monitoring:
    driver: bridge
    enable_ipv4: true
    enable_ipv6: true
