- name: Setup Grafana Stack Environment
  hosts: packer
  become: true
  vars:
    server_name: "grafana"
    users_data: "{{ lookup('file', '../../../../documents/employees/employees.yaml') | from_yaml }}"
    former_users_data: "{{ lookup('file', '../../../../documents/employees/former_employees.yaml') | from_yaml }}"
  tasks:
    - name: Re-gather facts from the target host
      ansible.builtin.setup: {}

    - name: Set a hostname
      ansible.builtin.hostname:
        name: "{{ server_name }}"
      tags:
        - hostname

    - name: Install required apt packages
      ansible.builtin.apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - dnsutils
          - gnupg2
          - lsb-release
          - python3-pip
          - unzip
          - sudo
          - wget
        state: present
        update_cache: true

    - name: Install Boto3
      ansible.builtin.pip:
        name:
          - boto3 >= 1.34.0
          - botocore >= 1.34.0
        state: present

    - name: Install Falco
      ansible.builtin.include_tasks:
        file: "../../shared/falco_client/main.yaml"
      vars:
        falco_version: "0.38.2"
      tags:
        - falco

    - name: Weaken SSH
      ansible.builtin.include_tasks:
        file: "../../../shared/weaken_ssh/main.yaml"
      tags:
        - ssh

    - name: Set Ansible user
      ansible.builtin.include_tasks:
        file: "../../shared/semaphore_ansible/main.yaml"
      tags:
        - ansible

    # The config generated here gets overwritten in the next task
    - name: Install Teleport client
      ansible.builtin.include_tasks:
        file: "../../../shared/teleport_client/main.yaml"
      vars:
        teleport_node_name: "{{ server_name }}"
        teleport_join_token: f9cls1hngcuu0jdngaggazaxupqncmlb
        teleport_node_label:
          service: grafana
          division: monitoring
          os: linux
        teleport_app_service_enabled: "yes"
        teleport_apps:
          - name: grafana
            uri: "http://localhost:9000"
            labels:
              service: grafana
              division: monitoring
          - name: prometheus
            uri: "http://localhost:9090"
            labels:
              service: prometheus
              division: monitoring
      tags:
        - teleport

    - name: Overwrite Teleport Config
      ansible.builtin.template:
        src: files/teleport.yaml
        dest: /etc/teleport.yaml
        validate: "/usr/local/bin/teleport configure --test %s"
        mode: "0644"
      vars:
        teleport_join_token: f9cls1hngcuu0jdngaggazaxupqncmlb
      tags:
        - teleport

    - name: Setup black team task
      ansible.builtin.include_tasks:
        file: "../../../shared/black_team/main.yaml"
      vars:
        root_groups: sudo
      tags:
        - black-team

    - name: Ensure old versions of Docker are not installed
      ansible.builtin.apt:
        name:
          - containerd
          - docker
          - docker-engine
          - docker.io
          - runc
        state: absent

    - name: Add Docker Repository
      ansible.builtin.deb822_repository:
        name: docker
        types: [deb]
        uris: "https://download.docker.com/linux/{{ ansible_facts['distribution'] | lower }}"
        signed_by: "https://download.docker.com/linux/{{ ansible_facts['distribution'] | lower }}/gpg"
        suites: ["{{ ansible_facts['distribution_release'] | lower }}"]
        components: [stable]
        state: present
        enabled: yes

    - name: Install Packages
      ansible.builtin.apt:
        name:
          - "containerd.io"
          - "docker-buildx-plugin"
          - "docker-ce"
          - "docker-ce-cli"
          - "docker-ce-rootless-extras"
          - "docker-compose-plugin"
          - "python3-pip" # Needed for Boto3, which is needed for RustFS
        state: present
        update_cache: true

    - name: Make sure users in the docker group
      ansible.builtin.user:
        name: "{{ item }}"
        groups: docker
        append: yes
      loop:
        - admin
        - black-team

    - name: Create grafana directory
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: root
        group: root
      with_items:
        - /opt/grafana
        - /opt/grafana/ssl
        - /opt/grafana/config
        - /opt/grafana/dashboards

    - name: Copy docker-compose and supporting files
      ansible.builtin.copy:
        src: ./files/{{ item }}
        dest: /opt/grafana/{{ item }}
        owner: root
        group: root
        mode: "0644"
      with_items:
        - compose.yaml
        - mimir.yaml
        - loki.yaml
        - nginx.conf
        - traefik.yaml
        - traefik-ssl.yaml
        - prometheus.yaml
        - grafana-provisioning-datasources.yaml
        - grafana-provisioning-dashboards.yaml
        - grafana.ini
        - grafana-provisioning-contact-points.yaml
        - grafana-provisioning-alert-rules.yml
        - grafana.ini
        - mimir-compose.yaml
        - loki-compose.yaml

    - name: Copy dashboards
      ansible.builtin.copy:
        src: ./files/dashboards/
        dest: /opt/grafana/dashboards/
        owner: root
        group: root
        mode: "0644"

    - name: Pull docker images
      community.docker.docker_compose_v2_pull:
        project_src: /opt/grafana

    - name: Start RustFS Container
      community.docker.docker_compose_v2:
        project_src: /opt/grafana
        services: storage
        state: present

    - name: Create Buckets
      amazon.aws.s3_bucket:
        name: "{{ item }}"
        state: present
        endpoint_url: http://localhost:9001
        access_key: storageuser
        secret_key: storagepassword
      with_items:
        - backup
        - grafana
        - logs
        - loki
        - mimir
        - private
        - public

    - name: Copy Bucket Files
      ansible.builtin.copy:
        src: ./files/bucket-files/
        dest: /tmp/buckets/
        owner: root
        group: root
        mode: "0644"

    - name: Upload Bucket Files
      amazon.aws.s3_object:
        bucket: "{{ item.bucket }}"
        object: "{{ item.object }}"
        src: "/tmp/buckets/{{ item.src }}"
        endpoint_url: http://localhost:9001
        access_key: storageuser
        secret_key: storagepassword
        mode: put
        encrypt: false
        permission: []
      with_items:
        - bucket: private
          object: "recipes/burger.pdf"
          src: "recipe.pdf"
        - bucket: public
          object: "about.txt"
          src: "about.txt"
        - bucket: private
          object: "customers.csv"
          src: "customers.csv"

    - name: Download MC cli
      ansible.builtin.get_url:
        url: "https://dl.min.io/client/mc/release/linux-amd64/mc"
        dest: /tmp/mc
        mode: "0755"
        owner: root
        group: root

    - name: Configure MC cli
      ansible.builtin.command: >
        /tmp/mc alias set local http://localhost:9001 storageuser storagepassword
      args:
        creates: /home/{{ ansible_user }}/.mc/config.json

    - name: Edit Buckets ACLs
      ansible.builtin.command: >
        /tmp/mc anonymous set public local/{{ item }}
      with_items:
        - public
        - logs
        - grafana
        - private

    - name: Delete storage cli and temp bucket files
      ansible.builtin.file:
        name: "{{ item }}"
        state: absent
      with_items:
        - /tmp/mc
        - /tmp/buckets/

    - name: Stop RustFS Container
      community.docker.docker_compose_v2:
        project_src: /opt/grafana
        services: storage
        state: stopped

    - name: Setup Alloy
      ansible.builtin.include_tasks:
        file: "../../../shared/alloy/main.yaml"
      vars:
        mode: "pre"
        include_docker: true
        extra_config: |
          prometheus.scrape "nginx" {
            targets = [
              {
                __address__ = "127.0.0.1:9152",
                instance    = constants.hostname,
                job         = "nginx",
              },
            ]
            forward_to      = [prometheus.remote_write.remote.receiver]
            scrape_interval = "30s"
          }

          prometheus.scrape "falco" {
            targets = [
              {
                __address__ = "127.0.0.1:8765",
                instance    = constants.hostname,
                job         = "falco",
              },
            ]
            forward_to      = [prometheus.remote_write.remote.receiver]
            scrape_interval = "10m"
          }

          loki.source.file "falco_alerts" {
            targets = [
              {
                __path__ = "/var/log/falco_alerts.log",
                job      = "falco-alerts",
                instance = constants.hostname,
              },
            ]
            forward_to = [loki.process.falco_alerts.receiver]
          }

          loki.process "falco_alerts" {
            forward_to = [loki.write.remote.receiver]

            stage.json {
              expressions = {
                priority  = "priority",
                rule      = "rule",
                source    = "source",
                hostname  = "hostname",
                output    = "output",
              }
            }

            stage.labels {
              values = {
                priority = "",
                rule     = "",
                source   = "",
              }
            }
          }
      tags:
        - alloy

    - name: Create Linux Groups
      ansible.builtin.group:
        name: "{{ item | regex_replace(' ', '-') | lower }}"
        state: present
      with_items:
        - engineering
        - it
        - security
      tags:
        - users

    - name: Create Engineering Users
      ansible.builtin.user:
        name: "{{ item.username | regex_replace(' ', '.') | lower }}"
        password: "{{ item.password | password_hash('sha512') }}"
        append: true
        generate_ssh_key: true
        groups: "engineering{% if item.position == 'System Admin' %},sudo,docker,adm{% endif %}"
        shell: "/usr/bin/bash"
        state: present
      when: item.department == "Engineering"
      with_items: "{{ users_data.users }}"
      tags:
        - users

    - name: Create Security Users
      ansible.builtin.user:
        name: "{{ item.username | regex_replace(' ', '.') | lower }}"
        password: "{{ item.password | password_hash('sha512') }}"
        append: true
        groups: "security,docker"
        shell: "/usr/bin/bash"
        state: present
      when: item.department == "Security"
      with_items: "{{ users_data.users }}"
      tags:
        - users

    - name: Create 'Systems Engineer' user
      ansible.builtin.user:
        name: "{{ item.username | regex_replace(' ', '.') | lower }}"
        password: "{{ item.password | password_hash('sha512') }}"
        append: true
        groups: "engineering,it,adm,sudo,systemd-journal,docker"
        shell: "/usr/bin/bash"
        state: present
      when: item.position == "Systems Engineer"
      with_items: "{{ users_data.users }}"
      tags:
        - users

    - name: Create Former Operations System Admin User
      ansible.builtin.user:
        name: "{{ item.username | regex_replace(' ', '.') | lower }}"
        password: "{{ item.password | password_hash('sha512') }}"
        append: true
        generate_ssh_key: true
        groups: "engineering,sudo,docker,adm"
        shell: "/usr/bin/bash"
        state: present
      when: item.position == "System Admin"
      with_items: "{{ former_users_data.users }}"
      tags:
        - users

    # Needed for ipv6 to work with docker
    # This was a pain to troubleshoot and figure out
    - name: Accept RAs even when forwarding is enabled
      block:
        - name: Accept RAs even when forwarding is enabled | ens5
          ansible.posix.sysctl:
            name: net.ipv6.conf.ens5.accept_ra
            sysctl_set: true
            value: "2"

        - name: Accept RAs even when forwarding is enabled | all
          ansible.posix.sysctl:
            name: net.ipv6.conf.all.accept_ra
            sysctl_set: true
            value: "2"

        - name: Copy sysctl file
          ansible.builtin.copy:
            src: files/sysctl.conf
            dest: /etc/sysctl.d/100-black-team.conf
            owner: root
            group: root
            mode: "0644"

        - name: Copy cloudinit file
          ansible.builtin.copy:
            src: files/cloudinit.cnf
            dest: /etc/cloud/cloud.cfg.d/100-black-team.cfg
            owner: root
            group: root
            mode: "0644"
