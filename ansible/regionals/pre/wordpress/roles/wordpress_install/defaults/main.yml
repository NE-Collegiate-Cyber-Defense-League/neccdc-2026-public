---
wordpress_action: install

mysql_root_password: rootpass
mysql_database: wordpress
mysql_user: wpuser
mysql_password: Password123!

wordpress_db_host: localhost
wordpress_db_user: "{{ mysql_user }}"
wordpress_db_name: "{{ mysql_database }}"
wordpress_db_password: "{{ mysql_password }}"

wp_url: http://10.10.1.80
wp_title: ChefOps
wp_admin_user: admin
wp_admin_pass: Password123!
wp_admin_email: admin@example.com

second_admin_user: user
second_admin_pass: user
second_admin_email: user@example.com

wordpress_path: /var/www/html
wp_cli_path: /usr/local/bin/wp

wordpress_root_htaccess: |
  # BEGIN WordPress
  Options +Indexes +FollowSymLinks
  <IfModule mod_rewrite.c>
  RewriteEngine On
  RewriteBase /
  RewriteRule ^index\.php$ - [L]
  RewriteCond %{REQUEST_FILENAME} !-f
  RewriteCond %{REQUEST_FILENAME} !-d
  RewriteRule . /index.php [L]
  </IfModule>
  # END WordPress

wordpress_block_php_htaccess: |
  Options +Indexes +FollowSymLinks
