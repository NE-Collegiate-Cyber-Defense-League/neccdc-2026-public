---
# https://www.asciiart.eu/art/a08d313773d5a75e
- name: Copy motd file
  ansible.builtin.copy:
    src: files/motd
    dest: /etc/motd.d/insights-client
    owner: root
    group: root
    mode: '0666'
  tags:
    - random

- name: PostgreSQL "backup" user
  become_user: postgres
  community.postgresql.postgresql_user:
    name: backup
    password: password
    role_attr_flags: SUPERUSER
    login_user: postgres
    login_unix_socket: /var/run/postgresql
  tags:
    - random

- name: PostgreSQL test user
  become_user: postgres
  community.postgresql.postgresql_user:
    name: gitlab
    password: gitlab
    role_attr_flags: NOLOGIN
    login_user: postgres
    login_unix_socket: /var/run/postgresql
  tags:
    - random

- name: Create a test database
  become_user: postgres
  community.postgresql.postgresql_db:
    name: test
    owner: gitlab
    template: template0
    encoding: UTF8
    lc_collate: en_US.UTF-8
    lc_ctype: en_US.UTF-8
  tags:
    - random
