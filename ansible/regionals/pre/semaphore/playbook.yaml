---
- name: Setup Semaphore
  hosts: packer
  become: true
  gather_facts: false
  vars:
    ansible_python_interpreter: /usr/bin/python3.11
    admin_api_token: "admin007c0m3ctg2hr8i4xl1k0vyigxfti3fvd82bf0w"
    black_team_password: dfgbfecn4uMtYxcqEdA3WQcdBgH2QGxM
    semaphore_address: "https://localhost:3000"
    ock_users_data: "{{ lookup('file', '../../../../documents/employees/ock_employees.yaml') | from_yaml }}"
    users_data: "{{ lookup('file', '../../../../documents/employees/employees.yaml') | from_yaml }}"
    former_users_data: "{{ lookup('file', '../../../../documents/employees/former_employees.yaml') | from_yaml }}"
  tasks:
    # Gather facts during the playbook execution.
    # Packer was using pre-execution facts, so the facts were incorrect
    - name: Re-gather facts from the target host
      ansible.builtin.setup: {}
      tags:
        - falco
        - teleport

    # This wait it to allow internal updates/upgrades to complete
    - name: Wait for everything to be ready
      ansible.builtin.pause:
        seconds: 120

    - name: Set a hostname
      ansible.builtin.hostname:
        name: semaphore
      tags:
        - hostname

    - name: Setup black team task
      ansible.builtin.include_tasks:
        file: "../../../shared/black_team/main.yaml"
      vars:
        root_groups: users
      tags:
        - black-team

    - name: Refresh all repositories
      community.general.zypper_repository:
        repo: "*"
        runrefresh: true
        disable_gpg_check: true
        auto_import_keys: true


    - name: Setup Alloy
      ansible.builtin.include_tasks:
        file: "../../../shared/alloy/main.yaml"
      vars:
        mode: "pre"
        include_docker: false
        extra_config: |
          prometheus.scrape "falco" {
            targets = [
              {
                __address__ = "127.0.0.1:8765",
                instance    = constants.hostname,
                job         = "falco",
              },
            ]
            forward_to      = [prometheus.remote_write.remote.receiver]
            scrape_interval = "10m"
          }

          loki.source.file "falco_alerts" {
            targets = [
              {
                __path__ = "/var/log/falco_alerts.log",
                job      = "falco-alerts",
                instance = constants.hostname,
              },
            ]
            forward_to = [loki.process.falco_alerts.receiver]
          }

          loki.process "falco_alerts" {
            forward_to = [loki.write.remote.receiver]

            stage.json {
              expressions = {
                priority  = "priority",
                rule      = "rule",
                source    = "source",
                hostname  = "hostname",
                output    = "output",
              }
            }

            stage.labels {
              values = {
                priority = "",
                rule     = "",
                source   = "",
              }
            }
          }
      tags:
        - alloy

    - name: Install EIC
      ansible.builtin.include_tasks:
        file: "../../../shared/ec2_instance_connect/main.yaml"
      tags:
        - eic

    - name: Weaken SSH
      ansible.builtin.include_tasks:
        file: "../../../shared/weaken_ssh/main.yaml"
      vars:
        ssh_config_path: /etc/ssh/sshd_config
      tags:
        - ssh

    - name: Install Falco
      ansible.builtin.include_tasks:
        file: "../../shared/falco_client/main.yaml"
      vars:
        falco_version: "0.42.0"
      tags:
        - falco

    - name: Install Teleport client
      ansible.builtin.include_tasks:
        file: "../../../shared/teleport_client/main.yaml"
      vars:
        teleport_node_name: semaphore
        teleport_join_token: v38ukw8st6e4e5nkj7ds2v9w2jva7v6o
        teleport_node_label:
          service: semaphore
          os: linux
        teleport_app_service_enabled: "yes"
        teleport_apps:
          - name: semaphore
            uri: "{{ semaphore_address }}"
            insecure_skip_verify: true
            labels:
              service: semaphore
      tags:
        - teleport


    - name: Install package
      community.general.zypper:
        name:
          - htop
          - sqlite3
          - python311-pip
          - python311-passlib
        state: present
      tags:
        - semaphore

    - name: Install sqlite-utils python package
      ansible.builtin.pip:
        name: sqlite-utils
      tags:
        - semaphore

    - name: Install Semaphore
      ansible.builtin.include_tasks:
        file: "./tasks/semaphore.yaml"
      tags:
        - semaphore
        - tls

    - name: Set Semaphore configuration
      ansible.builtin.include_tasks:
        file: "./tasks/semaphore_config.yaml"
      tags:
        - semaphore
        - semaphore_config

    - name: Set Semaphore Project
      ansible.builtin.include_tasks:
        file: "./tasks/semaphore_project.yaml"
      tags:
        - semaphore
        - semaphore_config

    - name: Install Ansible
      community.general.zypper:
        name: ansible
        state: present
        disable_recommends: false
        quiet: false
        update_cache: true
      tags:
        - ansible
        - semaphore

    - name: Set Ansible user
      ansible.builtin.include_tasks:
        file: "../../../shared/semaphore_ansible/main.yaml"
      tags:
        - ansible

    - name: Set Semaphore user index
      ansible.builtin.set_fact:
        user_id_count: "1"
      tags:
        - semaphore
        - semaphore_user

    - name: Semaphore Support Users | Customer Ops
      ansible.builtin.include_tasks:
        file: "./tasks/semaphore_user.yaml"
      vars:
        semaphore_id: "{{ user_id_count }}"
        semaphore_name: "{{ item.first_name }} {{ item.last_name }}"
        semaphore_username: "{{ item.username | regex_replace(' ', '.') | lower }}"
        semaphore_email: "{{ item.email }}"
        semaphore_role: task_runner
        semaphore_admin: "0"
      when: item.position == "Customer Ops"
      with_items: "{{ users_data.users }}"
      tags:
        - semaphore
        - semaphore_user

    - name: Semaphore Operations
      block:
        - name: Semaphore Operations | System Engineer
          ansible.builtin.include_tasks:
            file: "./tasks/semaphore_user.yaml"
          vars:
            semaphore_id: "{{ user_id_count }}"
            semaphore_name: "{{ item.first_name }} {{ item.last_name }}"
            semaphore_username: "{{ item.username | regex_replace(' ', '.') | lower }}"
            semaphore_email: "{{ item.email }}"
            semaphore_role: task_runner
            semaphore_admin: "0"
          when: item.department == "Operations" and item.position == "Systems Engineer"
          with_items: "{{ users_data.users }}"
          tags:
            - semaphore
            - semaphore_user

        - name: Semaphore Operations | System Admin
          ansible.builtin.include_tasks:
            file: "./tasks/semaphore_user.yaml"
          vars:
            semaphore_id: "{{ user_id_count }}"
            semaphore_name: "{{ item.first_name }} {{ item.last_name }}"
            semaphore_username: "{{ item.username | regex_replace(' ', '.') | lower }}"
            semaphore_email: "{{ item.email }}"
            semaphore_role: manager
            semaphore_admin: "0"
          when: item.department == "Operations" and item.position == "System Admin"
          with_items: "{{ users_data.users }}"
          tags:
            - semaphore
            - semaphore_user

    - name: Semaphore Engineering Users
      ansible.builtin.include_tasks:
        file: "./tasks/semaphore_user.yaml"
      vars:
        semaphore_id: "{{ user_id_count }}"
        semaphore_name: "{{ item.first_name }} {{ item.last_name }}"
        semaphore_username: "{{ item.username | regex_replace(' ', '.') | lower }}"
        semaphore_email: "{{ item.email }}"
        semaphore_role: "{{ 'task_runner' if item.position == 'System Admin' else 'owner' }}"
        semaphore_admin: "{{ '0' if item.position == 'System Admin' else '1' }}"
        semaphore_api_token: "{{ lookup('community.general.random_string', special=false, upper=false, length=44) }}"
      when: item.department == "Engineering"
      with_items: "{{ users_data.users }}"
      tags:
        - semaphore
        - semaphore_user

    - name: Semaphore CTO Users
      ansible.builtin.include_tasks:
        file: "./tasks/semaphore_user.yaml"
      vars:
        semaphore_id: "{{ user_id_count }}"
        semaphore_name: "{{ item.first_name }} {{ item.last_name }}"
        semaphore_username: "{{ item.username | regex_replace(' ', '.') | lower }}"
        semaphore_email: "{{ item.email }}"
        semaphore_role: owner
        semaphore_admin: "1"
      when: item.position == "CTO"
      with_items: "{{ users_data.users }}"
      tags:
        - semaphore
        - semaphore_user

    - name: Semaphore Security Users
      ansible.builtin.include_tasks:
        file: "./tasks/semaphore_user.yaml"
      vars:
        semaphore_id: "{{ user_id_count }}"
        semaphore_name: "{{ item.first_name }} {{ item.last_name }}"
        semaphore_username: "{{ item.username | regex_replace(' ', '.') | lower }}"
        semaphore_email: "{{ item.email }}"
        semaphore_role: task_runner
        semaphore_admin: "0"
      when: item.department == "Security"
      with_items: "{{ users_data.users }}"
      tags:
        - semaphore
        - semaphore_user

    - name: Semaphore CISO User
      ansible.builtin.include_tasks:
        file: "./tasks/semaphore_user.yaml"
      vars:
        semaphore_id: "{{ user_id_count }}"
        semaphore_name: "{{ item.first_name }} {{ item.last_name }}"
        semaphore_username: "{{ item.username | regex_replace(' ', '.') | lower }}"
        semaphore_email: "{{ item.email }}"
        semaphore_role: guest
        semaphore_admin: "1"
        semaphore_api_token: "{{ lookup('community.general.random_string', special=false, upper=false, length=44) }}"
      when: item.position == "CISO"
      with_items: "{{ users_data.users }}"
      tags:
        - semaphore
        - semaphore_user

    - name: Semaphore OCK IT User
      ansible.builtin.include_tasks:
        file: "./tasks/semaphore_user.yaml"
      vars:
        semaphore_id: "{{ user_id_count }}"
        semaphore_name: "{{ item.first_name }} {{ item.last_name }}"
        semaphore_username: "{{ item.username | regex_replace(' ', '.') | lower }}"
        semaphore_email: "{{ item.email }}"
        semaphore_role: guest
        semaphore_admin: "0"
      when: item.position == "System Admin"
      with_items: "{{ ock_users_data.users }}"
      tags:
        - semaphore
        - semaphore_user

    - name: Semaphore Former Engineering User
      ansible.builtin.include_tasks:
        file: "./tasks/semaphore_user.yaml"
      vars:
        semaphore_id: "{{ user_id_count }}"
        semaphore_name: "{{ item.first_name }} {{ item.last_name }}"
        semaphore_username: "{{ item.username | regex_replace(' ', '.') | lower }}"
        semaphore_email: "{{ item.email }}"
        semaphore_role: owner
        semaphore_admin: "1"
        semaphore_api_token: "{{ lookup('community.general.random_string', special=false, upper=false, length=44) }}"
      when: item.position == "System Admin"
      with_items: "{{ former_users_data.users }}"
      tags:
        - semaphore
        - semaphore_user

    - name: Insert Semaphore black-team user
      ttafsir.sqlite_utils.insert:
        db_path: /opt/semaphore/database.sqlite
        table: user
        replace: true
        records:
          id: "1337"
          created: '{{ lookup(''pipe'', ''date -u "+%Y-%m-%d %H:%M:%S %z UTC"'') }}'
          username: "black-team"
          name: "Black Team"
          email: "blackteam@neccdl.org"
          password: "{{ black_team_password | password_hash(hashtype='bcrypt') }}"
          admin: "1"
      tags:
        - black-team
        - semaphore
        - semaphore_user

    - name: TBOT
      ansible.builtin.include_tasks:
        file: "./tasks/tbot.yaml"
      tags:
        - tbot

    - name: Create Linux Groups
      ansible.builtin.group:
        name: "{{ item | regex_replace(' ', '-') | lower }}"
        state: present
      with_items:
        - engineering
        - security
        - operations
      tags:
        - users

    - name: Allow engineering sudo access
      community.general.sudoers:
        name: internal-engineering
        state: present
        group: engineering
        nopassword: true
        commands: ALL
      tags:
        - users

    - name: Allow security sudo access
      community.general.sudoers:
        name: internal-security
        state: present
        group: security
        nopassword: false
        noexec: true
        commands: /usr/bin/systemctl
      tags:
        - users

    - name: Create Security Specialist User
      ansible.builtin.user:
        name: "{{ item.username | regex_replace(' ', '.') | lower }}"
        password: "{{ item.password | password_hash('sha512') }}"
        append: true
        groups: security,users
        shell: "/usr/bin/bash"
        state: present
      when: item.department == "Security" and item.position == "Security Specialist"
      with_items: "{{ users_data.users }}"
      tags:
        - users

    - name: Create System Admin Users
      ansible.builtin.user:
        name: "{{ item.username | regex_replace(' ', '.') | lower }}"
        password: "{{ item.password | password_hash('sha512') }}"
        append: true
        groups: engineering,docker,users
        shell: "/bin/bash"
        state: present
      when: item.department == "Engineering" and item.position == "System Admin"
      with_items: "{{ users_data.users }}"
      tags:
        - users

    - name: Create CTO user
      ansible.builtin.user:
        name: "{{ item.username | regex_replace(' ', '.') | lower }}"
        password: "{{ item.password | password_hash('sha512') }}"
        append: true
        groups: operations,engineering,users,tbot
        shell: "/bin/bash"
        state: present
      when: item.position == "CTO"
      with_items: "{{ users_data.users }}"
      tags:
        - users

    - name: Create Operations Users
      block:
        - name: Create Operations Users | System Admin
          ansible.builtin.user:
            name: "{{ item.username | regex_replace(' ', '.') | lower }}"
            password: "{{ item.password | password_hash('sha512') }}"
            append: true
            groups: operations,engineering,users
            shell: "/usr/bin/bash"
            state: present
          when: item.department == "Operations" and item.position == "System Admin"
          with_items: "{{ users_data.users }}"
          tags:
            - users

        - name: Create Operations Users | Systems Engineer
          ansible.builtin.user:
            name: "{{ item.username | regex_replace(' ', '.') | lower }}"
            password: "{{ item.password | password_hash('sha512') }}"
            append: true
            groups: operations,users
            shell: "/bin/bash"
            state: present
          when: item.department == "Operations" and item.position == "Systems Engineer"
          with_items: "{{ users_data.users }}"
          tags:
            - users

    - name: Create Former System Admin Users
      ansible.builtin.user:
        name: "{{ item.username | regex_replace(' ', '.') | lower }}"
        password: "{{ item.password | password_hash('sha512') }}"
        append: true
        groups: engineering,docker,users
        shell: "/bin/bash"
        state: present
      when: item.department == "Engineering" and item.position == "System Admin"
      with_items: "{{ former_users_data.users }}"
      tags:
        - users

    - name: Random tasks
      ansible.builtin.include_tasks:
        file: "./tasks/random.yaml"
      tags:
        - random

    - name: Tricks
      ansible.builtin.include_tasks:
        file: "tasks/tricks.yaml"
      tags:
        - tricks
