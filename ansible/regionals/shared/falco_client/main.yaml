---
- name: Set Falco driver
  ansible.builtin.set_fact:
    falco_driver_type: "{{ falco_driver_override | default('modern_ebpf') }}"
  tags:
    - falco

- name: Install Falco
  ansible.builtin.include_tasks:
    file: "tasks/setup-{{ ansible_facts['os_family'] }}.yaml"
  tags:
    - falco

- name: Check Falco config directory permissions
  ansible.builtin.file:
    dest: /etc/falco
    state: directory
    mode: '0755'
  tags:
    - falco

# https://falco.org/docs/reference/daemon/config-options/#config-files
# Validate changes with `falco -c /etc/falco/falco.yaml --dry-run`
- name: Update Falco config
  ansible.builtin.copy:
    src: files/falco.yaml
    dest: /etc/falco/config.d/config.yaml
    mode: '0644'
    backup: false
  tags:
    - falco

- name: Reload systemd daemon
  ansible.builtin.systemd:
    daemon_reload: true
  tags:
    - falco

- name: Disable and stop Falco
  ansible.builtin.service:
    name: falco-{{ item }}
    state: stopped
    enabled: false
  with_items:
    - modern-bpf
    - kmod
  tags:
    - falco
