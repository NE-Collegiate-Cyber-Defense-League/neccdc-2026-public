json_output: true
syslog_output:
  enabled: true
http_output:
  enabled: false
metrics:
  enabled: true
  interval: 15m
  output_rule: false
webserver:
  enabled: true
  prometheus_metrics_enabled: true
  listen_port: 8765
  # Can be an IPV4 or IPV6 address, defaults to IPV4.
  listen_address: "::"
  ssl_enabled: false # Why is this not set to true?
file_output:
  enabled: true
  keep_alive: false
  filename: /var/log/falco_alerts.log
