---
- name: Configure Wordpress
  hosts: wordpress
  become: true
  tasks:
    - name: Update WordPress site url
      ansible.builtin.command:
        cmd: wp option update siteurl "https://{{ domains.corp.team }}"
      args:
        chdir: /var/www/html
      become: true
      become_user: www-data

    - name: Update WordPress home url
      ansible.builtin.command:
        cmd: wp option update home "https://{{ domains.corp.team }}"
      args:
        chdir: /var/www/html
      become: true
      become_user: www-data
