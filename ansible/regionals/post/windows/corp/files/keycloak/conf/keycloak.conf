# ─── Database ────────────────────────────────────────────────────────────────
db=dev-file
#db-username=keycloak
#db-password=password
#db-url=jdbc:postgresql://localhost/keycloak

# ─── HTTP / HTTPS ────────────────────────────────────────────────────────────
http-enabled=true
http-host=0.0.0.0
http-port=80
https-port=443
https-certificate-file=${kc.home.dir}/conf/server.crt.pem
https-certificate-key-file=${kc.home.dir}/conf/server.key.pem

proxy-headers=xforwarded
hostname-strict=false
#proxy=reencrypt
#hostname=myhostname

# ─── Observability ───────────────────────────────────────────────────────────
health-enabled=true
metrics-enabled=true

# Expose metrics on the main HTTP interface (port 80)
# Scrape Prometheus at :80/metrics
legacy-observability-interface=true

# ─── Features ────────────────────────────────────────────────────────────────
features=user-event-metrics,log-mdc

# ─── User Event Metrics ──────────────────────────────────────────────────────
event-metrics-user-enabled=true
event-metrics-user-tags=realm,clientId
# event-metrics-user-events=login,logout,register,reset_password,update_credential,client_login,token_exchange,introspect_token,refresh_token,user_disabled_by_permanent_lockout,user_disabled_by_temporary_lockout

# ─── Logging ─────────────────────────────────────────────────────────────────
log=file
log-level=info

# JSON output lets Loki parse realmName, clientId, ipAddress as structured fields
log-console-output=json
log-file-output=json

# MDC — attach auth context to every log line
log-mdc-enabled=true
log-mdc-keys=realmName,clientId,userId,ipAddress,sessionId

http-access-log-enabled=true
http-access-log-pattern=combined
http-access-log-exclude=/(metrics|health).*