---
- name: Install-ADCSCertificationAuthority-PS (restore from backup)
  ansible.windows.win_powershell:
    script: |
      [CmdletBinding()]
      param (
          [String]
          $cert_file_password,
          [String]
          $cert_file_path
      )

      $caParams = @{
          CAType            = "EnterpriseRootCA"
          CertFile          = $cert_file_path
          CertFilePassword  = ($cert_file_password | ConvertTo-SecureString -AsPlainText -Force)
          DatabaseDirectory = "C:\windows\system32\certLog"
          LogDirectory      = "C:\windows\system32\certLog"
          Force             = $true
      }

      try {
          Install-ADcsCertificationAuthority @caParams
          $Ansible.Changed = $true
      } catch {
          if ($_.Exception.Message -match "The Certification Authority is already installed.") {
              $Ansible.Changed = $false
          } else {
              $Ansible.Changed = $false
              throw $_
          }
      }
    error_action: stop
    parameters:
      cert_file_path: "{{ adcs_backup_cert_file_path }}"
    sensitive_parameters:
      - name: cert_file_password
        value: "{{ adcs_backup_cert_file_password }}"
