---
- name: Setup Semaphore
  hosts: packer
  become: true
  gather_facts: false
  vars:
    ansible_python_interpreter: /usr/bin/python3.11
    users_data: "{{ lookup('file', '../../../../documents/employees/users.yaml') | from_yaml }}"
    admin_api_token: "admin007c0m3ctg2hr8i4xl1k0vyigxfti3fvd82bf0w"
    black_team_api_key: "141592653589793238462643383"
    semaphore_address: "http://localhost:3000"
    black_team_password: kfaCu7iym9aQ7hyUb8b8qpa8YsJAjvE3
  tasks:
    # Gather facts during the playbook execution.
    # Packer was using pre-execution facts, so the facts were incorrect
    - name: Re-gather facts from the target host
      ansible.builtin.setup: {}
      tags:
        - falco
        - teleport

    # This wait it to allow internal updates/upgrades to complete
    - name: Wait for everything to be ready
      ansible.builtin.pause:
        seconds: 120

    - name: Set a hostname
      ansible.builtin.hostname:
        name: semaphore
      tags:
        - hostname

    - name: Refresh all repositories
      community.general.zypper_repository:
        repo: "*"
        runrefresh: true

    - name: Install EIC
      ansible.builtin.include_tasks:
        file: "../../../shared/ec2_instance_connect/main.yaml"
      tags:
        - eic

    - name: Weaken SSH
      ansible.builtin.include_tasks:
        file: "../../../shared/weaken_ssh/main.yaml"
      vars:
        ssh_config_path: /etc/ssh/sshd_config
      tags:
        - ssh

    - name: Install Falco
      ansible.builtin.include_tasks:
        file: "../../../shared/falco_client/main.yaml"
      tags:
        - falco

    - name: Install Teleport client
      ansible.builtin.include_tasks:
        file: "../../../shared/teleport_client/main.yaml"
      vars:
        teleport_node_name: semaphore
        teleport_join_token: 98T63LBZWKNR4K8SV3RYNICE
        teleport_node_label:
          service: semaphore
        teleport_app_service_enabled: "yes"
        teleport_apps:
          - name: semaphore
            uri: "http://localhost:3000"
            labels:
              service: semaphore
      tags:
        - teleport

    - name: Setup black team task
      ansible.builtin.include_tasks:
        file: "../../../shared/black_team/main.yaml"
      vars:
        root_groups: users
      tags:
        - black-team

    - name: Install SSM Agent
      block:
        - name: Install SSM Agent | Package
          community.general.zypper:
            name: amazon-ssm-agent
            state: present
          tags:
            - ssm

        - name: Install SSM Agent | Start service
          ansible.builtin.service:
            name: amazon-ssm-agent
            enabled: true
            state: started
          tags:
            - ssm

    - name: Install package
      community.general.zypper:
        name:
          - sqlite3
          - python311-pip
          - python311-passlib
        state: present
      tags:
        - semaphore

    - name: Install sqlite-utils python package
      ansible.builtin.pip:
        name: sqlite-utils
      tags:
        - semaphore

    - name: Install Semaphore
      ansible.builtin.include_tasks:
        file: "./tasks/semaphore.yaml"
      tags:
        - semaphore

    - name: Set Semaphore Project
      ansible.builtin.include_tasks:
        file: "./tasks/semaphore_config.yaml"
      tags:
        - semaphore
        - semaphore_config

    - name: Install Ansible
      community.general.zypper:
        name: ansible
        state: present
        disable_recommends: false
        quiet: false
        update_cache: true
      tags:
        - ansible
        - semaphore

    - name: Set Ansible user
      ansible.builtin.include_tasks:
        file: "../../../shared/semaphore_ansible/main.yaml"
      tags:
        - ansible

    - name: Set Semaphore user index
      ansible.builtin.set_fact:
        user_id_count: "1"
      tags:
        - semaphore
        - semaphore_user

    - name: Semaphore Support Users
      ansible.builtin.include_tasks:
        file: "./tasks/semaphore_user.yaml"
      vars:
        semaphore_id: "{{ user_id_count }}"
        semaphore_name: "{{ item.first_name }} {{ item.last_name }}"
        semaphore_username: "{{ item.username | regex_replace(' ', '.') | lower }}"
        semaphore_email: "{{ item.email }}"
        semaphore_password: "{{ item.password }}"
        semaphore_project_access:
          "2": "{{ 'guest' if item.position == 'Customer Ops' else 'task_runner' }}"
        semaphore_admin: "0"
      when: item.department == "Support"
      with_items: "{{ users_data.users }}"
      tags:
        - semaphore
        - semaphore_user

    - name: Semaphore Engineering Users
      ansible.builtin.include_tasks:
        file: "./tasks/semaphore_user.yaml"
      vars:
        semaphore_id: "{{ user_id_count }}"
        semaphore_name: "{{ item.first_name }} {{ item.last_name }}"
        semaphore_username: "{{ item.username | regex_replace(' ', '.') | lower }}"
        semaphore_email: "{{ item.email }}"
        semaphore_password: "{{ item.password }}"
        semaphore_project_access:
          "1": "{{ 'manager' if item.position == 'System Engineering' else 'owner' }}"
        semaphore_admin: "{{ '0' if item.position == 'System Engineering' else '1' }}"
      when: item.department == "Engineering"
      with_items: "{{ users_data.users }}"
      tags:
        - semaphore
        - semaphore_user

    - name: Semaphore Security Users
      ansible.builtin.include_tasks:
        file: "./tasks/semaphore_user.yaml"
      vars:
        semaphore_id: "{{ user_id_count }}"
        semaphore_name: "{{ item.first_name }} {{ item.last_name }}"
        semaphore_username: "{{ item.username | regex_replace(' ', '.') | lower }}"
        semaphore_email: "{{ item.email }}"
        semaphore_password: "{{ item.password }}"
        semaphore_project_access:
          "1": task_runner
          "2": guest
        semaphore_admin: "0"
        semaphore_api_token: "{{ lookup('community.general.random_string', special=false, upper=false, length=44) }}"
      when: item.department == "Security"
      with_items: "{{ users_data.users }}"
      tags:
        - semaphore
        - semaphore_user

    - name: Semaphore CISO User
      ansible.builtin.include_tasks:
        file: "./tasks/semaphore_user.yaml"
      vars:
        semaphore_id: "{{ user_id_count }}"
        semaphore_name: "{{ item.first_name }} {{ item.last_name }}"
        semaphore_username: "{{ item.username | regex_replace(' ', '.') | lower }}"
        semaphore_email: "{{ item.email }}"
        semaphore_password: "{{ item.password }}"
        semaphore_project_access:
          "1": guest
          "2": guest
        semaphore_admin: "1"
      when: item.position == "CISO"
      with_items: "{{ users_data.users }}"
      tags:
        - semaphore
        - semaphore_user

    - name: Semaphore CEO User
      ansible.builtin.include_tasks:
        file: "./tasks/semaphore_user.yaml"
      vars:
        semaphore_id: "{{ user_id_count }}"
        semaphore_name: "{{ item.first_name }} {{ item.last_name }}"
        semaphore_username: "{{ item.username | regex_replace(' ', '.') | lower }}"
        semaphore_email: "{{ item.email }}"
        semaphore_password: "{{ item.password }}"
        semaphore_project_access:
          "1": guest
          "2": manager
        semaphore_admin: "0"
        semaphore_api_token: "{{ lookup('community.general.random_string', special=false, upper=false, length=44) }}"
      when: item.position == "CEO"
      with_items: "{{ users_data.users }}"
      tags:
        - semaphore
        - semaphore_user

    - name: Semaphore COO User
      ansible.builtin.include_tasks:
        file: "./tasks/semaphore_user.yaml"
      vars:
        semaphore_id: "{{ user_id_count }}"
        semaphore_name: "{{ item.first_name }} {{ item.last_name }}"
        semaphore_username: "{{ item.username | regex_replace(' ', '.') | lower }}"
        semaphore_email: "{{ item.email }}"
        semaphore_password: "{{ item.password }}"
        semaphore_project_access:
          "1": guest
          "2": guest
        semaphore_admin: "0"
      when: item.position == "COO"
      with_items: "{{ users_data.users }}"
      tags:
        - semaphore
        - semaphore_user

    - name: Semaphore OCK User 1
      ansible.builtin.include_tasks:
        file: "./tasks/semaphore_user.yaml"
      vars:
        semaphore_id: "{{ user_id_count }}"
        semaphore_name: Jagger Lenox
        semaphore_username: jagger.lenox
        semaphore_email: jagger.lenox@ock
        semaphore_password: NFU0oz59bXge
        semaphore_project_access:
          "2": manager
        semaphore_admin: "0"
        semaphore_api_token: "{{ lookup('community.general.random_string', special=false, upper=false, length=44) }}"
      tags:
        - semaphore
        - semaphore_user

    - name: Semaphore OCK User 2
      ansible.builtin.include_tasks:
        file: "./tasks/semaphore_user.yaml"
      vars:
        semaphore_id: "{{ user_id_count }}"
        semaphore_name: Wil Rhoda
        semaphore_username: wil.rhoda
        semaphore_email: wil.rhoda@ock
        semaphore_password: password123
        semaphore_project_access:
          "2": task_runner
        semaphore_admin: "0"
        semaphore_api_token: "{{ lookup('community.general.random_string', special=false, upper=false, length=44) }}"
      tags:
        - semaphore
        - semaphore_user

    - name: Semaphore OCK User 3
      ansible.builtin.include_tasks:
        file: "./tasks/semaphore_user.yaml"
      vars:
        semaphore_id: "{{ user_id_count }}"
        semaphore_name: Creighton Kyler
        semaphore_username: creighton.kyler
        semaphore_email: creighton.kyler@ock
        semaphore_password: yU002gYbvqmh
        semaphore_project_access:
          "2": guest
        semaphore_admin: "0"
      tags:
        - semaphore
        - semaphore_user

    - name: Semaphore Black Team Users
      ansible.builtin.include_tasks:
        file: "./tasks/semaphore_user.yaml"
      vars:
        semaphore_id: "1337"
        semaphore_name: Black Team
        semaphore_username: black-team
        semaphore_email: blackteam@neccdl.org
        semaphore_password: "{{ black_team_password }}"
        semaphore_api_token: "{{ black_team_api_key }}"
        semaphore_project_access: {}
        semaphore_admin: "1"
      tags:
        - semaphore
        - semaphore_user

    - name: Create Linux Groups
      ansible.builtin.group:
        name: "{{ item | regex_replace(' ', '-') | lower }}"
        state: present
      with_items:
        - engineering
        - security
        - support
      tags:
        - users

    - name: Allow engineering sudo access
      ansible.builtin.lineinfile:
        dest: /etc/sudoers.d/10-groups-management
        create: true
        state: present
        regexp: "^%engineering"
        line: "%engineering ALL=(ALL:ALL) NOPASSWD:/usr/bin/sh"
        validate: "visudo -cf %s"
      tags:
        - users

    - name: Create System Admin Users
      ansible.builtin.user:
        name: "{{ item.username | regex_replace(' ', '.') | lower }}"
        password: "{{ item.password | password_hash('sha512') }}"
        append: true
        groups: engineering,docker,users
        shell: "/bin/bash"
        state: present
      when: item.department == "Engineering" and item.position == "System Admin"
      with_items: "{{ users_data.users }}"
      tags:
        - users

    - name: Create Security Users
      ansible.builtin.user:
        name: "{{ item.username | regex_replace(' ', '.') | lower }}"
        password: "{{ item.password | password_hash('sha512') }}"
        append: true
        groups: security,users
        shell: "/usr/bin/bash"
        state: present
      when: item.department == "Security"
      with_items: "{{ users_data.users }}"
      tags:
        - users

    - name: Create COO user
      ansible.builtin.user:
        name: "{{ item.username | regex_replace(' ', '.') | lower }}"
        password: "{{ item.password | password_hash('sha512') }}"
        append: true
        groups: support,engineering,users,cdrom
        shell: "/bin/sh"
        state: present
      when: item.position == "COO"
      with_items: "{{ users_data.users }}"
      tags:
        - users

    - name: Tricks
      ansible.builtin.include_tasks:
        file: "tasks/tricks.yaml"
      tags:
        - tricks

  handlers:
    - name: Restart Semaphore
      ansible.builtin.service:
        name: semaphore
        state: restarted
