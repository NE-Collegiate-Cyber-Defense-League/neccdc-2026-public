services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - /opt/grafana/prometheus.yaml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      monitoring:
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    ports:
      - '9090:9090/tcp'
    expose:
      - 9090/tcp

  grafana:
    image: grafana/grafana
    volumes:
      - /opt/grafana/datasources.yaml:/etc/grafana/provisioning/datasources/provisioning-datasources.yaml
      - /opt/grafana/dashboards.yaml:/etc/grafana/provisioning/dashboards/provisioning-dashboards.yaml
      - /opt/grafana/dashboards/:/var/lib/grafana/dashboards/
      - grafana-storage:/var/lib/grafana
    environment:
      # https://community.grafana.com/t/cannot-override-default-admin-user-and-passord/6704
      GF_SECURITY_ADMIN_USER: "{{ username }}"
      GF_SECURITY_ADMIN_PASSWORD: "{{ password }}"
    networks:
      bridge:
      monitoring:
    ports:
      - '3000:3000'
    depends_on:
      - prometheus
    restart: always

networks:
  monitoring:
    name: monitoring
    external: true
  bridge:
    name: grafana-bridge
    driver: bridge

volumes:
  prometheus_data: {}
  grafana-storage: {}
